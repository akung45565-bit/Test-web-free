<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P File Transfer (WebRTC)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; }
        .box { border: 1px solid #ccc; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        button { padding: 10px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <h2>web pengirim tanpa server</h2>

    <div class="box">
        <h3>1. Inisialisasi Koneksi</h3>
        <button id="createOffer">Buat Room (Pengirim)</button>
        <p>Atau tempel Offer dari pengirim di bawah (Penerima):</p>
        <textarea id="remoteOffer" placeholder="Tempel kode di sini..."></textarea>
        <button id="acceptOffer">Terima Offer & Buat Answer</button>
    </div>

    <div class="box">
        <h3>2. Finalisasi (Hanya untuk Pengirim)</h3>
        <p>Tempel Answer dari penerima di sini:</p>
        <textarea id="remoteAnswer" placeholder="Tempel Answer..."></textarea>
        <button id="finishConnect">Hubungkan!</button>
    </div>

    <div class="box">
        <h3>3. Transfer File</h3>
        <input type="file" id="fileInput" disabled>
        <button id="sendFile" disabled>Kirim File</button>
        <p id="status">Status: Belum Terhubung</p>
        <progress id="progress" value="0" max="100" style="width: 100%;"></progress>
    </div>

    <script>
        const pc = new RTCPeerConnection({
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        });
        let dataChannel;

        // Fungsi copy ke clipboard (opsional untuk mempermudah)
        const copyToClipboard = (text) => {
            navigator.clipboard.writeText(text);
            alert("Kode disalin! Kirim ke HP sebelah via WA/Chat.");
        };

        // 1. Pengirim membuat Offer
        document.getElementById('createOffer').onclick = async () => {
            dataChannel = pc.createDataChannel("fileTransfer");
            setupDataChannel();

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            // Tunggu ICE gathering selesai agar kode lengkap
            pc.onicecandidate = (e) => {
                if (!e.candidate) {
                    console.log("Offer siap!");
                    document.getElementById('remoteOffer').value = JSON.stringify(pc.localDescription);
                    copyToClipboard(JSON.stringify(pc.localDescription));
                }
            };
        };

        // 2. Penerima menerima Offer dan buat Answer
        document.getElementById('acceptOffer').onclick = async () => {
            const offerText = document.getElementById('remoteOffer').value;
            await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(offerText)));
            
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);

            pc.onicecandidate = (e) => {
                if (!e.candidate) {
                    document.getElementById('remoteAnswer').value = JSON.stringify(pc.localDescription);
                    copyToClipboard(JSON.stringify(pc.localDescription));
                }
            };
        };

        // 3. Pengirim menempel Answer
        document.getElementById('finishConnect').onclick = async () => {
            const answerText = document.getElementById('remoteAnswer').value;
            await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(answerText)));
        };

        // Setup Data Channel
        pc.ondatachannel = (event) => {
            dataChannel = event.channel;
            setupDataChannel();
        };

        function setupDataChannel() {
            dataChannel.onopen = () => {
                document.getElementById('status').innerText = "Status: Terhubung!";
                document.getElementById('fileInput').disabled = false;
                document.getElementById('sendFile').disabled = false;
            };

            let receivedChunks = [];
            dataChannel.onmessage = (event) => {
                if (typeof event.data === 'string') {
                    // Metadata file (nama file)
                    console.log("Menerima file:", event.data);
                } else {
                    receivedChunks.push(event.data);
                    // Logika sederhana: jika selesai, buat download link
                    // (Untuk file besar, butuh penanganan metadata ukuran file)
                    const blob = new Blob(receivedChunks);
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = "received_file";
                    a.innerText = "Klik untuk Download File";
                    document.body.appendChild(a);
                }
            };
        }

        // 4. Kirim File
        document.getElementById('sendFile').onclick = () => {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const buffer = e.target.result;
                const chunkSize = 16384; // 16KB per chunk
                for (let i = 0; i < buffer.byteLength; i += chunkSize) {
                    dataChannel.send(buffer.slice(i, i + chunkSize));
                }
                alert("File terkirim!");
            };
            reader.readAsArrayBuffer(file);
        };
    </script>
</body>
</html>
